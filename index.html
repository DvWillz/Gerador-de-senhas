<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>A Lenda de Jhulia e Willian</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#111;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:default}

.mb{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);border:2.5px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:bold;pointer-events:auto;user-select:none;-webkit-user-select:none}
.mb:active{background:rgba(255,255,255,.4)}
#bL{width:62px;height:62px;left:18px;bottom:70px}
#bR{width:62px;height:62px;left:100px;bottom:70px}

#bA{width:62px;height:62px;right:70px;bottom:110px}
#bD{width:62px;height:62px;right:20px;bottom:50px}
#bU{width:62px;height:62px;left:58px;bottom:140px}
@media(pointer:coarse){#ui{display:block}}

<body>
<canvas id="c"></canvas>
<div id="ui">
<div class="mb" id="bL">&#9664;</div>
<div class="mb" id="bR">&#9654;</div>
<div class="mb" id="bU">&#9650;</div>
<div class="mb" id="bJ">J</div>
<div class="mb" id="bA">A</div>
<div class="mb" id="bD">D</div>
</div>
<script>
"use strict";
/*============================================================
  A LENDA DE JHULIA E WILLIAN
  2-D Action / Adventure / Exploration Platformer
  Pure HTML5 Canvas - no external assets
============================================================*/

// --- constants ---
var GW = 800, GH = 600, TS = 32;
var GRAV = 0.55, MAXFALL = 14, PSPD = 4.2, PJUMP = -11.8;
var DASH_SPD = 14, DASH_DUR = 10, DASH_CD = 55;
var WSLIDE = 2.2, WJX = 7, WJY = -10.5, POGO = -13;

// --- canvas ---
var cvs = document.getElementById('c');
var cx  = cvs.getContext('2d');

function resize() {
    var s = Math.min(innerWidth / GW, innerHeight / GH);
    cvs.width  = GW; cvs.height = GH;
    cvs.style.width  = (GW * s | 0) + 'px';
    cvs.style.height = (GH * s | 0) + 'px';
}
resize();
addEventListener('resize', resize);

// --- procedural audio ---
var actx = null;
function initAudio() {
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { /* no audio */ }
}

function snd(type) {
    if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    var o = actx.createOscillator();
    var g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    var t = actx.currentTime;
    switch (type) {
        case 'jump':
            o.type = 'sine';
            o.frequency.setValueAtTime(380, t);
            o.frequency.exponentialRampToValueAtTime(620, t + 0.1);
            g.gain.setValueAtTime(0.22, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            o.start(t); o.stop(t + 0.12);
            break;
        case 'dash':
            o.type = 'triangle';
            o.frequency.setValueAtTime(180, t);
            o.frequency.exponentialRampToValueAtTime(80, t + 0.15);
            g.gain.setValueAtTime(0.2, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            o.start(t); o.stop(t + 0.15);
            break;
        case 'punch':
            o.type = 'square';
            o.frequency.setValueAtTime(160, t);
            o.frequency.exponentialRampToValueAtTime(50, t + 0.08);
            g.gain.setValueAtTime(0.18, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            o.start(t); o.stop(t + 0.1);
            break;
        case 'grito':
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(500, t);
            o.frequency.exponentialRampToValueAtTime(900, t + 0.2);
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
            o.start(t); o.stop(t + 0.25);
            break;
        case 'hit':
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(120, t);
            o.frequency.exponentialRampToValueAtTime(40, t + 0.07);
            g.gain.setValueAtTime(0.25, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
            o.start(t); o.stop(t + 0.08);
            break;
        case 'coin':
            o.type = 'sine';
            o.frequency.setValueAtTime(900, t);
            o.frequency.exponentialRampToValueAtTime(1400, t + 0.15);
            g.gain.setValueAtTime(0.2, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
            o.start(t); o.stop(t + 0.18);
            break;
        case 'dmg':
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(250, t);
            o.frequency.exponentialRampToValueAtTime(50, t + 0.25);
            g.gain.setValueAtTime(0.3, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            o.start(t); o.stop(t + 0.3);
            break;
        case 'door':
            o.type = 'sine';
            o.frequency.setValueAtTime(400, t);
            o.frequency.exponentialRampToValueAtTime(800, t + 0.3);
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
            o.start(t); o.stop(t + 0.35);
            break;
        case 'boss':
            o.type = 'square';
            o.frequency.setValueAtTime(80, t);
            o.frequency.exponentialRampToValueAtTime(30, t + 0.4);
            g.gain.setValueAtTime(0.3, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
            o.start(t); o.stop(t + 0.5);
            break;
        case 'win': {
            var o2 = actx.createOscillator();
            var g2 = actx.createGain();
            o2.connect(g2); g2.connect(actx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(523, t);
            o.frequency.setValueAtTime(659, t + 0.15);
            o.frequency.setValueAtTime(784, t + 0.3);
            g.gain.setValueAtTime(0.2, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
            o.start(t); o.stop(t + 0.6);
            o2.type = 'sine';
            o2.frequency.setValueAtTime(784, t + 0.3);
            o2.frequency.setValueAtTime(1047, t + 0.45);
            g2.gain.setValueAtTime(0.15, t + 0.3);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
            o2.start(t + 0.3); o2.stop(t + 0.7);
            break;
        }
    }
}

// --- particle system ---
var parts = [];
function emitP(x, y, n, col, spd, sz, life) {
    spd  = spd  || 3;
    sz   = sz   || 3;
    life = life || 30;
    for (var i = 0; i < n; i++) {
        var a = Math.random() * Math.PI * 2;
        var s = Math.random() * spd + 0.5;
        parts.push({
            x: x, y: y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s - Math.random() * 2,
            c: col, s: sz, l: life, ml: life, g: 0.25
        });
    }
}
function updateParts() {
    for (var i = parts.length - 1; i >= 0; i--) {
        var p = parts[i];
        p.x += p.vx; p.y += p.vy; p.vy += p.g; p.l--;
        if (p.l <= 0) parts.splice(i, 1);
    }
}
function drawParts() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        cx.globalAlpha = p.l / p.ml;
        cx.fillStyle = p.c;
        cx.fillRect(p.x | 0, p.y | 0, p.s, p.s);
    }
    cx.globalAlpha = 1;
}

// --- damage numbers ---
var dnums = [];
function addDmgNum(x, y, val, col) {
    dnums.push({ x: x, y: y, val: val, col: col, l: 55, vy: -2 });
}
function updateDnums() {
    for (var i = dnums.length - 1; i >= 0; i--) {
        var d = dnums[i];
        d.y += d.vy; d.vy += 0.04; d.l--;
        if (d.l <= 0) dnums.splice(i, 1);
    }
}
function drawDnums() {
    for (var i = 0; i < dnums.length; i++) {
        var d = dnums[i];
        cx.globalAlpha = Math.min(1, d.l / 30);
        cx.fillStyle   = d.col;
        cx.font        = 'bold 14px monospace';
        cx.textAlign   = 'center';
        cx.fillText(d.val.toFixed(1), d.x | 0, d.y | 0);
    }
    cx.globalAlpha = 1;
    cx.textAlign = 'left';
}

// --- input system ---
var keys = {};
var tch  = {};
var clickX = -1, clickY = -1, clicked = false;

addEventListener('keydown', function (e) {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) >= 0)
        e.preventDefault();
});
addEventListener('keyup', function (e) { keys[e.code] = false; });

['bL','bR','bU','bJ','bA','bD'].forEach(function (id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', function (e) { e.preventDefault(); tch[id] = true; }, { passive: false });
    el.addEventListener('touchend',   function (e) { e.preventDefault(); tch[id] = false; }, { passive: false });
    el.addEventListener('touchcancel', function ()  { tch[id] = false; });
});

cvs.addEventListener('click', function (e) {
    initAudio();
    var r = cvs.getBoundingClientRect();
    clickX  = (e.clientX - r.left) * (GW / r.width);
    clickY  = (e.clientY - r.top)  * (GH / r.height);
    clicked = true;
});
cvs.addEventListener('touchstart', function () { initAudio(); }, { once: true });

function inp(a) {
    switch (a) {
        case 'left':  return keys.KeyA || keys.ArrowLeft  || tch.bL;
        case 'right': return keys.KeyD || keys.ArrowRight || tch.bR;
        case 'up':    return keys.KeyW || keys.ArrowUp || keys.Space || tch.bJ || tch.bU;
        case 'atk':   return keys.KeyJ || keys.KeyZ || tch.bA;
        case 'dash':  return keys.KeyK || keys.KeyX || tch.bD;
        case 'enter': return keys.Enter || keys.NumpadEnter;
    }
    return false;
}

// --- camera ---
var camX = 0, camY = 0, shakeI = 0, shakeX = 0, shakeY = 0;

function camFollow(tx, ty, ww, wh) {
    camX += (tx - GW / 2 - camX) * 0.08;
    camY += (ty - GH / 2 - camY) * 0.08;
    if (camX < 0) camX = 0;
    if (camX > ww - GW) camX = ww - GW;
    if (camY < 0) camY = 0;
    if (camY > wh - GH) camY = wh - GH;
}
function camShake(i) { if (i > shakeI) shakeI = i; }
function camUpdate() {
    if (shakeI > 0.1) {
        shakeX = (Math.random() - 0.5) * shakeI;
        shakeY = (Math.random() - 0.5) * shakeI;
        shakeI *= 0.88;
    } else {
        shakeX = shakeY = 0; shakeI = 0;
    }
}

// --- rect-rect overlap ---
function rr(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

// --- tile map ---
// 0 air, 1 ground, 2 wall, 3 spike, 4 mushroom, 5 wind, 6 falling, 7 door
var COLS = 200, ROWS = 25;
var WW = COLS * TS, WH = ROWS * TS;
var tmap       = new Uint8Array(COLS * ROWS);
var fallTimer  = new Float32Array(COLS * ROWS);
var fallActive = new Uint8Array(COLS * ROWS);

function tset(c, r, v)  { if (c >= 0 && c < COLS && r >= 0 && r < ROWS) tmap[r * COLS + c] = v; }
function tget(c, r)     { return (c >= 0 && c < COLS && r >= 0 && r < ROWS) ? tmap[r * COLS + c] : 0; }
function tFloor(c1, c2, r) { for (var c = c1; c <= c2; c++) tset(c, r, 1); }
function tWall(c, r1, r2)  { for (var r = r1; r <= r2; r++) tset(c, r, 2); }
function tileSolid(t) { return t === 1 || t === 2 || t === 6; }

// --- build world ---
function buildMap() {
    tmap.fill(0);
    fallTimer.fill(0);
    fallActive.fill(0);

    // ZONE 1 - Tutorial (cols 0-25)
    tFloor(0, 25, 15);
    tWall(0, 0, 15);
    tset(6, 13, 1); tset(7, 13, 1);
    tset(10, 12, 4);
    tset(14, 13, 1); tset(15, 13, 1);
    tset(18, 11, 1); tset(19, 11, 1); tset(20, 11, 1);
    tWall(25, 0, 13);
    tset(25, 14, 7); tset(25, 15, 7);

    // ZONE 2 - Wind (cols 26-52)
    tFloor(26, 30, 15);
    tset(33, 18, 5); tset(34, 18, 5); tset(35, 18, 5); tset(36, 18, 5);
    tFloor(38, 42, 15);
    tset(44, 18, 5); tset(45, 18, 5); tset(46, 18, 5);
    tFloor(48, 52, 15);

    // ZONE 3 - Wall Jump (cols 53-78)
    tFloor(53, 56, 15);
    tWall(57, 4, 15);
    tset(60, 12, 1); tset(61, 12, 1);
    tset(58, 9, 1); tset(59, 9, 1);
    tWall(62, 4, 15);
    tset(64, 7, 1); tset(65, 7, 1);
    tset(67, 10, 6); tset(68, 10, 6); tset(69, 10, 6);
    tset(71, 8, 6); tset(72, 8, 6);
    tFloor(74, 78, 15);

    // ZONE 4 - Mushroom Parkour (cols 79-103)
    tFloor(79, 81, 15);
    tset(84, 14, 4); tset(88, 13, 4); tset(92, 12, 4); tset(96, 13, 4);
    tFloor(99, 103, 15);

    // ZONE 5 - Spikes & Enemies (cols 104-130)
    tFloor(104, 135, 15);
    for (var c = 108; c <= 128; c++) tset(c, 14, 3);
    tset(112, 11, 1); tset(113, 11, 1); tset(114, 11, 1);
    tset(120, 11, 1); tset(121, 11, 1); tset(122, 11, 1);
    tset(128, 11, 1); tset(129, 11, 1);

    // ZONE 5.5 - Mini Boss (cols 131-145)
    tWall(131, 0, 13);
    tset(131, 14, 7); tset(131, 15, 7);
    tFloor(132, 144, 15);
    tWall(145, 0, 13);
    tset(145, 14, 7); tset(145, 15, 7);

    // ZONE 6 - Final Boss (cols 146-180)
    tFloor(146, 180, 15);
    tFloor(152, 156, 13);
    tFloor(158, 162, 11);
    tFloor(164, 168, 9);
    tset(155, 12, 2); tset(160, 10, 2); tset(165, 8, 2);
    tWall(180, 0, 15);

    // bottom boundary
    for (c = 0; c < COLS; c++) tset(c, ROWS - 1, 1);
}

// --- tile collision resolver ---
function resolveCol(ent, dx, dy) {
    var onG = false, hitC = false, wL = false, wR = false;
    var c, r, t, tx, ty, di, d, dtx, dty;

    // X step
    ent.x += dx;
    var c1 = Math.floor(ent.x / TS), c2 = Math.floor((ent.x + ent.w - 1) / TS);
    var r1 = Math.floor(ent.y / TS), r2 = Math.floor((ent.y + ent.h - 1) / TS);
    for (r = r1; r <= r2; r++) {
        for (c = c1; c <= c2; c++) {
            t = tget(c, r);
            if (tileSolid(t)) {
                tx = c * TS; ty = r * TS;
                if (ent.x < tx + TS && ent.x + ent.w > tx && ent.y < ty + TS && ent.y + ent.h > ty) {
                    if (dx > 0) { ent.x = tx - ent.w; wR = true; }
                    else if (dx < 0) { ent.x = tx + TS; wL = true; }
                }
            }
            for (di = 0; di < doors.length; di++) {
                d = doors[di];
                if (!d.open && d.col === c && d.row === r) {
                    dtx = c * TS; dty = r * TS;
                    if (ent.x < dtx + TS && ent.x + ent.w > dtx && ent.y < dty + TS && ent.y + ent.h > dty) {
                        if (dx > 0) { ent.x = dtx - ent.w; wR = true; }
                        else if (dx < 0) { ent.x = dtx + TS; wL = true; }
                    }
                }
            }
        }
    }

    // Y step
    ent.y += dy;
    c1 = Math.floor(ent.x / TS); c2 = Math.floor((ent.x + ent.w - 1) / TS);
    r1 = Math.floor(ent.y / TS); r2 = Math.floor((ent.y + ent.h - 1) / TS);
    for (r = r1; r <= r2; r++) {
        for (c = c1; c <= c2; c++) {
            t = tget(c, r);
            if (tileSolid(t)) {
                tx = c * TS; ty = r * TS;
                if (ent.x < tx + TS && ent.x + ent.w > tx && ent.y < ty + TS && ent.y + ent.h > ty) {
                    if (dy > 0) { ent.y = ty - ent.h; onG = true; }
                    else if (dy < 0) { ent.y = ty + TS; hitC = true; }
                }
            }
            if (t === 6 && onG) fallActive[r * COLS + c] = 1;
            for (di = 0; di < doors.length; di++) {
                d = doors[di];
                if (!d.open && d.col === c && d.row === r) {
                    dtx = c * TS; dty = r * TS;
                    if (ent.x < dtx + TS && ent.x + ent.w > dtx && ent.y < dty + TS && ent.y + ent.h > dty) {
                        if (dy > 0) { ent.y = dty - ent.h; onG = true; }
                        else if (dy < 0) { ent.y = dty + TS; hitC = true; }
                    }
                }
            }
        }
    }

    return { onG: onG, hitC: hitC, wL: wL, wR: wR };
}

// --- game objects ---
var player, enemies, collectibles, doors, npcs, projectiles;
var gameState = 'title';
var hitStop = 0, tick = 0;
var hasKey = false, bossDefeated = false, minibossDefeated = false;
var endingChoice = 0, endingText = '', geminiLoading = false, geminiKey = '';

// --- player factory ---
function mkPlayer() {
    return {
        x: 2 * TS, y: 13 * TS, w: 20, h: 28,
        vx: 0, vy: 0, face: 1,
        grounded: false, onWall: false, wallSide: 0,
        canDash: true, dashing: 0, dashCD: 0,
        jumpHeld: false, jumpBuf: 0, coyote: 0,
        hp: 5, maxHp: 5, choc: 0,
        invuln: 0, flash: 0, atkCD: 0,
        cpX: 2 * TS, cpY: 13 * TS,
        dead: false, ghosts: [], animT: 0
    };
}

// --- enemy factories ---
function mkBeetle(col, row, range) {
    return {
        type: 'beetle', x: col * TS, y: (row - 1) * TS + 12,
        w: 24, h: 20, vx: 0.8, vy: 0,
        hp: 2, maxHp: 2, alive: true, flash: 0,
        pL: (col - range) * TS, pR: (col + range) * TS
    };
}
function mkMiniboss(col, row) {
    return {
        type: 'mini', x: col * TS, y: (row - 2) * TS,
        w: 48, h: 48, vx: 0.4, vy: 0,
        hp: 5, maxHp: 5, alive: true, flash: 0,
        pL: (col - 3) * TS, pR: (col + 3) * TS
    };
}
function mkBoss(col, row) {
    return {
        type: 'boss', x: col * TS, y: (row - 3) * TS,
        w: 56, h: 56, vx: 0, vy: 0,
        hp: 10, maxHp: 10, alive: true, flash: 0,
        active: false, atkCD: 120
    };
}

// --- init level ---
function initLevel() {
    buildMap();
    player = mkPlayer();
    hasKey = false; bossDefeated = false; minibossDefeated = false;
    endingChoice = 0; endingText = '';

    enemies = [
        mkBeetle(110, 14, 3),
        mkBeetle(116, 14, 3),
        mkBeetle(124, 14, 3),
        mkMiniboss(138, 14),
        mkBoss(170, 12)
    ];

    collectibles = [
        { x: 19 * TS, y: 9 * TS,   w: 20, h: 20, type: 'choc', got: false, bob: 0 },
        { x: 40 * TS, y: 13 * TS,  w: 20, h: 20, type: 'choc', got: false, bob: 1 },
        { x: 59 * TS, y: 7 * TS,   w: 20, h: 20, type: 'choc', got: false, bob: 2 },
        { x: 92 * TS, y: 10 * TS,  w: 20, h: 20, type: 'choc', got: false, bob: 3 },
        { x: 113 * TS, y: 9 * TS,  w: 20, h: 20, type: 'choc', got: false, bob: 4 },
        { x: 121 * TS, y: 9 * TS,  w: 20, h: 20, type: 'choc', got: false, bob: 5 },
        { x: 138 * TS, y: 10 * TS, w: 20, h: 20, type: 'choc', got: false, bob: 6 },
        { x: 165 * TS, y: 7 * TS,  w: 20, h: 20, type: 'choc', got: false, bob: 7 },
        { x: 18 * TS + 4, y: 9 * TS, w: 16, h: 16, type: 'key', got: false, bob: 0 }
    ];

    doors = [
        { col: 25, row: 14, open: false, needKey: true  },
        { col: 25, row: 15, open: false, needKey: true  },
        { col: 131, row: 14, open: false, needKey: false },
        { col: 131, row: 15, open: false, needKey: false },
        { col: 145, row: 14, open: false, needKey: false },
        { col: 145, row: 15, open: false, needKey: false }
    ];

    npcs = [
        { x: 4 * TS, y: 14 * TS - 32, w: 24, h: 32, name: 'Mago', role: 'mago', col: '#9B59B6',
          msg: 'Use WASD para mover, J atacar, K dash!' },
        { x: 50 * TS, y: 14 * TS - 32, w: 24, h: 32, name: 'Elfa', role: 'elfa', col: '#2ECC71',
          msg: 'O vento te carrega! Pule nas correntes.' },
        { x: 74 * TS, y: 14 * TS - 32, w: 24, h: 32, name: 'Ninja', role: 'ninja', col: '#34495E',
          msg: 'Encoste na parede e pule para escalar!' },
        { x: 99 * TS, y: 14 * TS - 32, w: 24, h: 32, name: 'Caveira', role: 'caveira', col: '#ECF0F1',
          msg: 'Cogumelos te impulsionam para o alto!' },
        { x: 105 * TS, y: 14 * TS - 32, w: 24, h: 32, name: 'Alien', role: 'alien', col: '#1ABC9C',
          msg: 'Cuidado com espinhos! Use plataformas.' },
        { x: 148 * TS, y: 14 * TS - 32, w: 24, h: 32, name: 'Cavaleiro', role: 'cavaleiro', col: '#95A5A6',
          msg: 'O Bizorro Rei espera adiante. Boa sorte!' }
    ];

    projectiles = [];
    parts.length = 0;
    dnums.length = 0;
    camX = 0; camY = 0;
}

// --- player update ---
function updatePlayer() {
    var p = player;
    if (p.dead) return;
    if (p.invuln > 0) p.invuln--;
    if (p.flash > 0)  p.flash--;
    if (p.atkCD > 0)  p.atkCD--;
    if (p.dashCD > 0) p.dashCD--;
    p.animT++;

    // dash
    if (p.dashing > 0) {
        p.dashing--;
        p.vx = DASH_SPD * p.face;
        p.vy = 0;
        if (tick % 2 === 0) p.ghosts.push({ x: p.x, y: p.y, l: 12 });
        emitP(p.x + p.w / 2, p.y + p.h / 2, 1, 'rgba(200,220,255,0.7)', 1.5, 4, 10);
        resolveCol(p, p.vx, 0);
        return;
    }

    // ghost trail fade
    for (var i = p.ghosts.length - 1; i >= 0; i--) {
        p.ghosts[i].l--;
        if (p.ghosts[i].l <= 0) p.ghosts.splice(i, 1);
    }

    // horizontal
    var mx = 0;
    if (inp('left'))  { mx = -1; p.face = -1; }
    else if (inp('right')) { mx = 1; p.face = 1; }

    if (mx !== 0) p.vx += mx * 0.65;
    p.vx *= p.grounded ? (mx === 0 ? 0.78 : 0.92) : 0.94;
    if (Math.abs(p.vx) > PSPD) p.vx = (p.vx > 0 ? 1 : -1) * PSPD;
    if (Math.abs(p.vx) < 0.1 && mx === 0) p.vx = 0;

    // gravity
    if (!p.grounded) {
        if (p.onWall && p.vy > 0) { p.vy += GRAV * 0.5; if (p.vy > WSLIDE) p.vy = WSLIDE; }
        else p.vy += GRAV;
    }
    if (p.vy > MAXFALL) p.vy = MAXFALL;

    // coyote & buffer
    if (p.grounded) p.coyote = 6; else if (p.coyote > 0) p.coyote--;
    var jp = inp('up');
    if (jp && !p.jumpHeld) p.jumpBuf = 8;
    if (p.jumpBuf > 0) p.jumpBuf--;

    if (p.jumpBuf > 0) {
        if (p.coyote > 0) {
            p.vy = PJUMP; p.coyote = 0; p.jumpBuf = 0;
            snd('jump'); emitP(p.x + p.w / 2, p.y + p.h, 5, '#ccc', 2, 3, 15);
        } else if (p.onWall) {
            p.vy = WJY; p.vx = WJX * (-p.wallSide);
            p.onWall = false; p.jumpBuf = 0;
            snd('jump'); emitP(p.x + p.w / 2, p.y + p.h / 2, 5, '#aaa', 2, 3, 15);
        }
    }
    if (!jp && p.vy < -2) p.vy *= 0.6;
    p.jumpHeld = jp;

    // dash trigger
    if (inp('dash') && p.canDash && p.dashCD <= 0 && !p.dashing) {
        p.dashing = DASH_DUR; p.dashCD = DASH_CD; p.canDash = false;
        snd('dash');
    }

    // physics resolve
    var res = resolveCol(p, p.vx, p.vy);
    p.grounded = res.onG;
    if (res.onG)  p.vy = 0;
    if (res.hitC) p.vy = 0;
    p.onWall   = (res.wL || res.wR) && !p.grounded;
    p.wallSide = res.wL ? -1 : (res.wR ? 1 : 0);
    if (p.grounded) { p.canDash = true; p.cpX = p.x; p.cpY = p.y; }

    // tile interactions
    var pc1 = Math.floor(p.x / TS), pc2 = Math.floor((p.x + p.w - 1) / TS);
    var pr1 = Math.floor(p.y / TS), pr2 = Math.floor((p.y + p.h - 1) / TS);
    for (var r = pr1; r <= pr2; r++) {
        for (var c = pc1; c <= pc2; c++) {
            var t = tget(c, r);
            if (t === 3 && p.invuln <= 0) {
                playerDamage(1);
                p.vx = (p.x < c * TS + TS / 2 ? -6 : 6); p.vy = -6;
            }
            if (t === 4 && p.vy > 0) {
                if (p.y + p.h > r * TS && p.y + p.h < r * TS + 14) {
                    p.vy = -16; p.grounded = false;
                    snd('jump'); emitP(c * TS + TS / 2, r * TS, 8, '#ff6b6b', 3, 3, 20);
                }
            }
            if (t === 5) {
                p.vy -= 1.2;
                if (tick % 3 === 0)
                    emitP(c * TS + Math.random() * TS, r * TS + Math.random() * TS, 1, 'rgba(150,200,255,0.5)', 1, 2, 20);
            }
        }
    }

    // void fall
    if (p.y > WH + 100) {
        playerDamage(1);
        p.x = p.cpX; p.y = p.cpY; p.vx = 0; p.vy = 0;
    }

    // attack
    if (inp('atk') && p.atkCD <= 0) playerAttack();
}

function playerDamage(amt) {
    var p = player;
    if (p.invuln > 0 || p.dead) return;
    p.hp -= amt; p.invuln = 60; p.flash = 30;
    snd('dmg'); camShake(10);
    emitP(p.x + p.w / 2, p.y + p.h / 2, 12, '#ff4444', 3, 3, 20);
    if (p.hp <= 0) { p.dead = true; gameState = 'gameover'; }
}

function playerAttack() {
    var p = player;
    if (p.choc >= 8) {
        snd('grito'); p.atkCD = 35;
        for (var i = 0; i < 8; i++) {
            var a = i * Math.PI / 4;
            projectiles.push({
                x: p.x + p.w / 2 - 6, y: p.y + p.h / 2 - 6,
                w: 12, h: 12, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7,
                dmg: 2, col: '#9B59B6', owner: 'p', life: 40
            });
        }
        camShake(8); emitP(p.x + p.w / 2, p.y + p.h / 2, 16, '#9B59B6', 5, 4, 20);
    } else if (p.choc >= 5) {
        snd('grito'); p.atkCD = 25;
        projectiles.push({
            x: p.x + (p.face > 0 ? p.w : -14), y: p.y + p.h / 2 - 7,
            w: 18, h: 14, vx: p.face * 9, vy: 0,
            dmg: 1.5, col: '#F1C40F', owner: 'p', life: 35
        });
        p.vx += -p.face * 2;
        camShake(4); emitP(p.x + p.w / 2 + p.face * 10, p.y + p.h / 2, 8, '#F1C40F', 3, 3, 15);
    } else {
        snd('punch'); p.atkCD = 20;
        projectiles.push({
            x: p.x + (p.face > 0 ? p.w : -12), y: p.y + p.h / 2 - 5,
            w: 14, h: 10, vx: p.face * 11, vy: 0,
            dmg: 1.5, col: '#E74C3C', owner: 'p', life: 12
        });
        p.vx += -p.face * 1;
        camShake(2); emitP(p.x + p.w / 2 + p.face * 10, p.y + p.h / 2, 5, '#E74C3C', 2, 3, 10);
    }
}

// --- enemies update ---
function updateEnemies() {
    var p = player;
    for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.alive) continue;
        if (e.flash > 0) e.flash--;

        if (e.type === 'beetle' || e.type === 'mini') {
            e.x += e.vx;
            if (e.x <= e.pL || e.x + e.w >= e.pR) e.vx *= -1;
            e.vy += GRAV;
            if (e.vy > MAXFALL) e.vy = MAXFALL;
            var er = resolveCol(e, 0, e.vy);
            if (er.onG) e.vy = 0;
        }

        if (e.type === 'boss') {
            if (!e.active) {
                if (p.x > 150 * TS) { e.active = true; snd('boss'); }
                continue;
            }
            var dx = p.x - e.x, dy = p.y - e.y;
            var dist = Math.sqrt(dx * dx + dy * dy) || 1;
            e.vx += (dx / dist) * 0.12;
            e.vy += (dy / dist) * 0.1;
            var spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
            if (spd > 2.2) { e.vx = (e.vx / spd) * 2.2; e.vy = (e.vy / spd) * 2.2; }
            e.x += e.vx; e.y += e.vy;
            e.atkCD--;
            if (e.atkCD <= 0) {
                e.atkCD = 90;
                var a = Math.atan2(p.y - e.y, p.x - e.x);
                projectiles.push({
                    x: e.x + e.w / 2 - 7, y: e.y + e.h / 2 - 7,
                    w: 14, h: 14, vx: Math.cos(a) * 3.5, vy: Math.sin(a) * 3.5,
                    dmg: 1, col: '#00ff00', owner: 'e', life: 120
                });
                snd('punch');
            }
        }

        // pogo bounce
        if (p.vy > 0 && !p.dead && rr(p, e)) {
            if (p.y + p.h < e.y + e.h * 0.5) {
                enemyDamage(e, 1.5);
                p.vy = POGO; p.canDash = true; p.dashCD = 0;
                hitStop = 4; camShake(6);
                snd('hit'); emitP(e.x + e.w / 2, e.y, 8, '#ff8800', 3, 3, 15);
                continue;
            }
        }

        // contact damage
        if (p.invuln <= 0 && !p.dead && rr(p, e)) {
            playerDamage(1);
            p.vx = (p.x < e.x ? -6 : 6); p.vy = -5;
        }
    }
}

function enemyDamage(e, amt) {
    e.hp -= amt; e.flash = 8;
    addDmgNum(e.x + e.w / 2, e.y - 5, amt, '#FFD700');
    camShake(3); emitP(e.x + e.w / 2, e.y + e.h / 2, 6, '#ff0000', 2, 3, 12);
    snd('hit');
    if (e.hp <= 0) {
        e.alive = false;
        camShake(12); hitStop = 6;
        emitP(e.x + e.w / 2, e.y + e.h / 2, 20, '#ff4400', 5, 4, 25);
        if (e.type === 'boss')  { bossDefeated = true; snd('win'); }
        if (e.type === 'mini') {
            minibossDefeated = true;
            for (var di = 0; di < doors.length; di++) {
                if (!doors[di].needKey) doors[di].open = true;
            }
            snd('door');
        }
    }
}

// --- projectiles update ---
function updateProjectiles() {
    for (var i = projectiles.length - 1; i >= 0; i--) {
        var pr = projectiles[i];
        pr.x += pr.vx; pr.y += pr.vy; pr.life--;
        var tc = Math.floor((pr.x + pr.w / 2) / TS);
        var tr = Math.floor((pr.y + pr.h / 2) / TS);
        if (tileSolid(tget(tc, tr))) {
            emitP(pr.x + pr.w / 2, pr.y + pr.h / 2, 4, pr.col, 2, 2, 10);
            projectiles.splice(i, 1); continue;
        }
        if (pr.life <= 0) { projectiles.splice(i, 1); continue; }
        if (pr.owner === 'e' && player.invuln <= 0 && !player.dead && rr(pr, player)) {
            playerDamage(pr.dmg); projectiles.splice(i, 1); continue;
        }
        if (pr.owner === 'p') {
            for (var ei = 0; ei < enemies.length; ei++) {
                if (enemies[ei].alive && rr(pr, enemies[ei])) {
                    enemyDamage(enemies[ei], pr.dmg);
                    projectiles.splice(i, 1); break;
                }
            }
        }
    }
}

// --- collectibles update ---
function updateCollectibles() {
    var p = player;
    for (var i = 0; i < collectibles.length; i++) {
        var c = collectibles[i];
        if (c.got) continue;
        if (rr(p, c)) {
            c.got = true;
            if (c.type === 'choc') { p.choc++; snd('coin'); emitP(c.x + c.w / 2, c.y + c.h / 2, 10, '#8B4513', 3, 3, 20); }
            if (c.type === 'key')  { hasKey = true; snd('coin'); emitP(c.x + c.w / 2, c.y + c.h / 2, 10, '#FFD700', 3, 3, 20); }
        }
    }
}

// --- doors update ---
function updateDoors() {
    var p = player;
    for (var i = 0; i < doors.length; i++) {
        var d = doors[i];
        if (d.open) continue;
        if (d.needKey && hasKey) {
            var ddx = Math.abs(p.x - d.col * TS), ddy = Math.abs(p.y - d.row * TS);
            if (ddx < TS * 2 && ddy < TS * 2) {
                d.open = true;
                for (var j = 0; j < doors.length; j++) {
                    if (doors[j].needKey && !doors[j].open) doors[j].open = true;
                }
                snd('door');
                emitP(d.col * TS + TS / 2, d.row * TS + TS / 2, 10, '#FFD700', 3, 3, 20);
                break;
            }
        }
    }
}

// --- falling tiles ---
function updateFallingTiles() {
    for (var i = 0; i < tmap.length; i++) {
        if (tmap[i] === 6 && fallActive[i]) {
            fallTimer[i] += 1;
            if (fallTimer[i] > 40) tmap[i] = 0;
        }
    }
}

// =================================================================
//  DRAWING
// =================================================================

var TCOL = { 1: '#6B5B3D', 2: '#555', 3: '#cc2222', 4: '#E74C3C', 5: 'rgba(100,180,255,0.25)', 6: '#8B7355', 7: '#8B4513' };

function drawTiles() {
    var sc = (camX / TS | 0) - 1, ec = ((camX + GW) / TS | 0) + 1;
    var sr = (camY / TS | 0) - 1, er = ((camY + GH) / TS | 0) + 1;
    if (sc < 0) sc = 0; if (sr < 0) sr = 0;
    if (ec >= COLS) ec = COLS - 1; if (er >= ROWS) er = ROWS - 1;

    for (var r = sr; r <= er; r++) {
        for (var c = sc; c <= ec; c++) {
            var t = tmap[r * COLS + c]; if (t === 0) continue;
            var tx = c * TS, ty = r * TS, ox = 0;

            if (t === 6 && fallActive[r * COLS + c])
                ox = Math.sin(fallTimer[r * COLS + c] * 0.8) * 3;

            if (t === 7) {
                var doorOpen = false;
                for (var di = 0; di < doors.length; di++) {
                    if (doors[di].col === c && doors[di].row === r && doors[di].open) { doorOpen = true; break; }
                }
                if (doorOpen) continue;
                cx.fillStyle = '#654321';
                cx.fillRect(tx, ty, TS, TS);
                cx.fillStyle = '#FFD700';
                cx.fillRect(tx + TS - 8, ty + TS / 2 - 2, 4, 4);
                continue;
            }

            cx.fillStyle = TCOL[t] || '#888';
            cx.fillRect((tx + ox) | 0, ty, TS, TS);

            if (t === 1) {
                cx.fillStyle = '#5a8f3d'; cx.fillRect(tx, ty, TS, 4);
            }
            if (t === 4) {
                cx.fillStyle = '#ffaaaa'; cx.fillRect(tx + 2, ty, TS - 4, 10);
                cx.fillStyle = '#fff';    cx.fillRect(tx + 6, ty + 4, TS - 12, 4);
                cx.fillStyle = '#9E6B4A'; cx.fillRect(tx + 12, ty + 10, 8, TS - 10);
            }
            if (t === 3) {
                cx.fillStyle = '#ff5555';
                for (var s = 0; s < 4; s++) {
                    cx.beginPath();
                    cx.moveTo(tx + s * 8, ty + TS);
                    cx.lineTo(tx + s * 8 + 4, ty + 4);
                    cx.lineTo(tx + s * 8 + 8, ty + TS);
                    cx.fill();
                }
            }
            if (t === 5) {
                cx.strokeStyle = 'rgba(150,200,255,0.4)'; cx.lineWidth = 1;
                for (var l = 0; l < 3; l++) {
                    var wy = ty + 8 + l * 10 + Math.sin(tick * 0.1 + l) * 3;
                    cx.beginPath(); cx.moveTo(tx, wy); cx.lineTo(tx + TS, wy - 5); cx.stroke();
                }
            }
        }
    }
}

function drawPlayer() {
    var p = player;
    if (p.dead) return;

    for (var i = 0; i < p.ghosts.length; i++) {
        var gh = p.ghosts[i];
        cx.globalAlpha = gh.l / 12 * 0.3;
        cx.fillStyle = '#aaddff';
        cx.fillRect(gh.x | 0, gh.y | 0, p.w, p.h);
    }
    cx.globalAlpha = 1;

    if (p.invuln > 0 && (p.invuln / 4 | 0) % 2 === 0) return;

    cx.fillStyle = '#FF69B4';
    cx.fillRect(p.x | 0, p.y | 0, p.w, p.h);
    cx.fillStyle = '#8B4513';
    cx.fillRect(p.x | 0, p.y | 0, p.w, 8);
    cx.fillStyle = '#FFE4C4';
    cx.fillRect((p.x + 4) | 0, (p.y + 8) | 0, p.w - 8, 8);
    cx.fillStyle = '#000';
    cx.fillRect((p.face > 0 ? p.x + p.w - 7 : p.x + 3) | 0, (p.y + 10) | 0, 3, 3);
    cx.fillStyle = '#FF1493';
    cx.fillRect(p.x | 0, (p.y + p.h - 10) | 0, p.w, 10);

    if (p.atkCD > 15) {
        cx.fillStyle = '#E74C3C';
        cx.fillRect((p.x + (p.face > 0 ? p.w : -8)) | 0, (p.y + 10) | 0, 8, 4);
    }

    if (p.onWall) {
        emitP(p.x + (p.wallSide > 0 ? p.w : 0), p.y + p.h / 2, 1, '#ccc', 1, 2, 8);
    }
}

function drawEnemies() {
    for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.alive) continue;
        var fc = e.flash > 0;

        if (e.type === 'beetle') {
            cx.fillStyle = fc ? '#fff' : '#8B4513';
            cx.fillRect(e.x | 0, e.y | 0, e.w, e.h);
            cx.fillStyle = '#ff0';
            cx.fillRect((e.x + 4) | 0, (e.y + 4) | 0, 4, 4);
            cx.fillRect((e.x + e.w - 8) | 0, (e.y + 4) | 0, 4, 4);
            cx.fillStyle = '#5C3317';
            cx.fillRect((e.x + 2) | 0, (e.y + e.h - 4) | 0, 4, 4);
            cx.fillRect((e.x + e.w - 6) | 0, (e.y + e.h - 4) | 0, 4, 4);
        }

        if (e.type === 'mini') {
            cx.fillStyle = fc ? '#fff' : '#654321';
            cx.fillRect(e.x | 0, e.y | 0, e.w, e.h);
            cx.fillStyle = '#ff0';
            cx.fillRect((e.x + 8) | 0, (e.y + 10) | 0, 8, 6);
            cx.fillRect((e.x + e.w - 16) | 0, (e.y + 10) | 0, 8, 6);
            cx.fillStyle = '#333';
            cx.fillRect((e.x + 4) | 0, (e.y - 6) | 0, 6, 8);
            cx.fillRect((e.x + e.w - 10) | 0, (e.y - 6) | 0, 6, 8);
            var bw = e.w + 10;
            cx.fillStyle = '#333'; cx.fillRect((e.x - 5) | 0, (e.y - 14) | 0, bw, 5);
            cx.fillStyle = '#00cc00'; cx.fillRect((e.x - 5) | 0, (e.y - 14) | 0, bw * (e.hp / e.maxHp), 5);
        }

        if (e.type === 'boss') {
            cx.fillStyle = fc ? '#fff' : '#4B0082';
            cx.fillRect(e.x | 0, e.y | 0, e.w, e.h);
            cx.fillStyle = '#FFD700';
            cx.fillRect((e.x + 8) | 0, (e.y - 8) | 0, e.w - 16, 10);
            for (var ci = 0; ci < 3; ci++)
                cx.fillRect((e.x + 12 + ci * 14) | 0, (e.y - 14) | 0, 6, 8);
            cx.fillStyle = '#ff0000';
            cx.fillRect((e.x + 12) | 0, (e.y + 16) | 0, 10, 8);
            cx.fillRect((e.x + e.w - 22) | 0, (e.y + 16) | 0, 10, 8);
            cx.fillStyle = '#00ff00';
            cx.fillRect((e.x + 16) | 0, (e.y + 32) | 0, e.w - 32, 6);
            bw = e.w + 20;
            cx.fillStyle = '#333'; cx.fillRect((e.x - 10) | 0, (e.y - 22) | 0, bw, 6);
            cx.fillStyle = '#ff0000'; cx.fillRect((e.x - 10) | 0, (e.y - 22) | 0, bw * (e.hp / e.maxHp), 6);
            cx.fillStyle = '#FFD700'; cx.font = 'bold 10px monospace'; cx.textAlign = 'center';
            cx.fillText('BIZORRO REI', (e.x + e.w / 2) | 0, (e.y - 26) | 0);
            cx.textAlign = 'left';
        }
    }
}

function drawCollectibles() {
    for (var i = 0; i < collectibles.length; i++) {
        var c = collectibles[i];
        if (c.got) continue;
        var bob = Math.sin(tick * 0.06 + c.bob) * 4;
        if (c.type === 'choc') {
            cx.fillStyle = '#5C3317';
            cx.fillRect(c.x | 0, (c.y + bob) | 0, c.w, c.h);
            cx.fillStyle = '#3E1F0D';
            cx.fillRect((c.x + 2) | 0, (c.y + bob + 2) | 0, c.w - 4, c.h - 4);
            cx.strokeStyle = '#5C3317'; cx.lineWidth = 1;
            cx.beginPath(); cx.moveTo(c.x + c.w / 2, c.y + bob + 2); cx.lineTo(c.x + c.w / 2, c.y + bob + c.h - 2); cx.stroke();
            cx.beginPath(); cx.moveTo(c.x + 2, c.y + bob + c.h / 2); cx.lineTo(c.x + c.w - 2, c.y + bob + c.h / 2); cx.stroke();
        }
        if (c.type === 'key') {
            cx.fillStyle = '#FFD700';
            cx.fillRect(c.x | 0, (c.y + bob) | 0, c.w, c.h);
            cx.fillStyle = '#DAA520';
            cx.fillRect((c.x + 2) | 0, (c.y + bob + c.h - 6) | 0, c.w - 4, 4);
            cx.fillRect((c.x + c.w / 2 - 2) | 0, (c.y + bob) | 0, 4, c.h);
        }
    }
}

function drawNPCs() {
    var p = player;
    for (var i = 0; i < npcs.length; i++) {
        var n = npcs[i];
        cx.fillStyle = n.col;
        cx.fillRect(n.x | 0, n.y | 0, n.w, n.h);
        cx.fillStyle = '#FFE4C4';
        cx.fillRect((n.x + 4) | 0, (n.y + 6) | 0, n.w - 8, 10);
        cx.fillStyle = '#000';
        cx.fillRect((n.x + 6) | 0, (n.y + 9) | 0, 3, 3);
        cx.fillRect((n.x + n.w - 9) | 0, (n.y + 9) | 0, 3, 3);
        cx.fillStyle = '#fff'; cx.font = 'bold 9px monospace'; cx.textAlign = 'center';
        cx.fillText(n.name, (n.x + n.w / 2) | 0, (n.y - 6) | 0);
        cx.textAlign = 'left';

        if (Math.abs(p.x - n.x) < 60 && !p.dead) {
            var tw = Math.min(n.msg.length * 5.5 + 16, 260);
            cx.fillStyle = 'rgba(0,0,0,0.8)';
            cx.fillRect((n.x + n.w / 2 - tw / 2) | 0, (n.y - 46) | 0, tw, 28);
            cx.fillStyle = '#fff'; cx.font = '9px monospace'; cx.textAlign = 'center';
            cx.fillText(n.msg, (n.x + n.w / 2) | 0, (n.y - 28) | 0);
            cx.textAlign = 'left';
        }
    }
}

function drawProjectiles() {
    for (var i = 0; i < projectiles.length; i++) {
        var pr = projectiles[i];
        cx.fillStyle = pr.col;
        cx.fillRect(pr.x | 0, pr.y | 0, pr.w, pr.h);
        cx.globalAlpha = 0.35;
        cx.fillRect((pr.x - pr.vx) | 0, (pr.y - pr.vy) | 0, pr.w, pr.h);
        cx.globalAlpha = 1;
    }
}

// --- UI / HUD ---
function drawUI() {
    var p = player;
    for (var i = 0; i < p.maxHp; i++) {
        cx.fillStyle = i < p.hp ? '#ff2222' : '#333';
        var hx = 12 + i * 28, hy = 12;
        cx.beginPath();
        cx.moveTo(hx + 10, hy + 6);
        cx.bezierCurveTo(hx + 10, hy, hx, hy, hx, hy + 6);
        cx.bezierCurveTo(hx, hy + 12, hx + 10, hy + 18, hx + 10, hy + 20);
        cx.bezierCurveTo(hx + 10, hy + 18, hx + 20, hy + 12, hx + 20, hy + 6);
        cx.bezierCurveTo(hx + 20, hy, hx + 10, hy, hx + 10, hy + 6);
        cx.fill();
    }

    cx.fillStyle = '#3E1F0D'; cx.fillRect(148, 14, 12, 14);
    cx.fillStyle = '#5C3317'; cx.font = 'bold 16px monospace';
    cx.fillText('x' + p.choc, 164, 28);

    var ay = 48;
    cx.font = 'bold 11px monospace';
    cx.fillStyle = '#E74C3C'; cx.fillText('[Z] Soco', 12, ay); ay += 16;
    if (p.choc >= 5) { cx.fillStyle = '#F1C40F'; cx.fillText('[Z] Grito', 12, ay); ay += 16; }
    if (p.choc >= 8) { cx.fillStyle = '#9B59B6'; cx.fillText('[Z] Super Grito', 12, ay); }

    if (p.dashCD > 0) {
        var pct = 1 - p.dashCD / DASH_CD;
        cx.fillStyle = 'rgba(0,0,0,0.4)'; cx.fillRect(12, GH - 28, 80, 8);
        cx.fillStyle = '#00ddff'; cx.fillRect(12, GH - 28, 80 * pct, 8);
        cx.fillStyle = '#fff'; cx.font = '9px monospace'; cx.fillText('DASH', 14, GH - 20);
    } else if (p.canDash) {
        cx.fillStyle = '#00ddff'; cx.font = '9px monospace'; cx.fillText('DASH PRONTO', 12, GH - 20);
    }

    if (hasKey) {
        cx.fillStyle = '#FFD700'; cx.font = 'bold 14px monospace';
        cx.fillText('CHAVE', GW - 90, 28);
    }

    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '10px monospace';
    cx.fillText('Zona ' + getZone(p.x), GW - 65, GH - 12);
}

function getZone(px) {
    var col = px / TS;
    if (col < 26) return '1'; if (col < 53) return '2'; if (col < 79) return '3';
    if (col < 104) return '4'; if (col < 131) return '5'; if (col < 146) return '5.5';
    return '6';
}

// --- background ---
function drawBG() {
    var grad = cx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, '#4a90d9'); grad.addColorStop(1, '#87CEEB');
    cx.fillStyle = grad; cx.fillRect(0, 0, GW, GH);

    cx.fillStyle = '#5a7a9a';
    for (var i = 0; i < 8; i++) {
        var mx = ((i * 200 - camX * 0.2) % 1800 + 1800) % 1800 - 200;
        cx.beginPath();
        cx.moveTo(mx, GH); cx.lineTo(mx + 100, GH - 180 - i * 15); cx.lineTo(mx + 200, GH);
        cx.fill();
    }

    cx.fillStyle = 'rgba(255,255,255,0.45)';
    for (i = 0; i < 6; i++) {
        var clx = ((i * 280 + tick * 0.3 - camX * 0.1) % 1400 + 1400) % 1400 - 100;
        cx.beginPath();
        cx.arc(clx, 80 + i * 25, 28, 0, Math.PI * 2);
        cx.arc(clx + 22, 70 + i * 25, 22, 0, Math.PI * 2);
        cx.arc(clx - 18, 75 + i * 25, 18, 0, Math.PI * 2);
        cx.fill();
    }
}

// --- title screen ---
function drawTitle() {
    var grad = cx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, '#1a0a2e'); grad.addColorStop(1, '#16213e');
    cx.fillStyle = grad; cx.fillRect(0, 0, GW, GH);

    cx.fillStyle = '#fff';
    for (var i = 0; i < 50; i++) {
        var sx = (i * 137 + tick) % GW, sy = (i * 97) % GH;
        cx.globalAlpha = 0.3 + Math.sin(tick * 0.05 + i) * 0.3;
        cx.fillRect(sx, sy, 2, 2);
    }
    cx.globalAlpha = 1;

    cx.textAlign = 'center';
    cx.fillStyle = '#FFD700'; cx.font = 'bold 36px monospace';
    cx.fillText('A Lenda de', GW / 2, 160);
    cx.fillStyle = '#FF69B4'; cx.font = 'bold 44px monospace';
    cx.fillText('Jhulia e Willian', GW / 2, 220);
    cx.fillStyle = '#aaa'; cx.font = '16px monospace';
    cx.fillText('Uma aventura de amor e coragem', GW / 2, 270);

    cx.fillStyle = '#FF69B4'; cx.fillRect(GW / 2 - 80, 320, 24, 32);
    cx.fillStyle = '#8B4513'; cx.fillRect(GW / 2 - 80, 320, 24, 8);
    cx.fillStyle = '#fff'; cx.font = '12px monospace';
    cx.fillText('Jhulia', GW / 2 - 68, 370);

    cx.fillStyle = '#4169E1'; cx.fillRect(GW / 2 + 56, 320, 24, 32);
    cx.fillStyle = '#333'; cx.fillRect(GW / 2 + 56, 320, 24, 8);
    cx.fillStyle = '#FFD700'; cx.fillRect(GW / 2 + 58, 316, 20, 6);
    cx.fillStyle = '#fff';
    cx.fillText('Willian', GW / 2 + 68, 370);

    cx.fillStyle = '#4B0082'; cx.fillRect(GW / 2 - 12, 310, 24, 24);
    cx.fillStyle = '#FFD700'; cx.fillRect(GW / 2 - 10, 304, 20, 8);
    cx.fillStyle = '#fff'; cx.font = '10px monospace';
    cx.fillText('Bizorro Rei', GW / 2, 350);

    cx.fillStyle = Math.sin(tick * 0.08) > 0 ? '#fff' : '#aaa';
    cx.font = 'bold 22px monospace';
    cx.fillText('Clique ou ENTER para jogar', GW / 2, 440);

    cx.fillStyle = '#666'; cx.font = '11px monospace';
    cx.fillText('PC: WASD/Setas=Mover  J/Z=Atacar  K/X=Dash  Espaco=Pular', GW / 2, 490);
    cx.fillText('Mobile: Botoes na tela', GW / 2, 510);

    cx.textAlign = 'left';
}

// --- ending choice screen ---
function drawEnding() {
    cx.fillStyle = 'rgba(0,0,0,0.85)'; cx.fillRect(0, 0, GW, GH);
    cx.textAlign = 'center';

    cx.fillStyle = '#FFD700'; cx.font = 'bold 30px monospace';
    cx.fillText('O Bizorro Rei foi derrotado!', GW / 2, 80);
    cx.fillStyle = '#fff'; cx.font = '18px monospace';
    cx.fillText('Escolha o destino de Jhulia e Willian:', GW / 2, 130);

    var h1 = endingChoice === 1;
    cx.fillStyle = h1 ? '#FFD700' : '#444';
    cx.fillRect(GW / 2 - 200, 170, 400, 80);
    cx.fillStyle = h1 ? '#000' : '#fff'; cx.font = 'bold 18px monospace';
    cx.fillText('Salvar Willian', GW / 2, 200);
    cx.font = '14px monospace';
    cx.fillText('Final Feliz - O Casamento Real', GW / 2, 225);

    var h2 = endingChoice === 2;
    cx.fillStyle = h2 ? '#FFD700' : '#444';
    cx.fillRect(GW / 2 - 200, 270, 400, 80);
    cx.fillStyle = h2 ? '#000' : '#fff'; cx.font = 'bold 18px monospace';
    cx.fillText('Zombar de Willian', GW / 2, 300);
    cx.font = '14px monospace';
    cx.fillText('Final Tragico - Presos Juntos', GW / 2, 325);

    cx.fillStyle = '#888'; cx.font = '12px monospace';
    cx.fillText('Setas + Enter ou Clique', GW / 2, 380);
    cx.textAlign = 'left';
}

// --- final screen ---
function drawFinalScreen() {
    cx.fillStyle = 'rgba(0,0,0,0.92)'; cx.fillRect(0, 0, GW, GH);
    cx.textAlign = 'center';

    if (endingChoice === 1) {
        cx.fillStyle = '#FF69B4'; cx.font = 'bold 36px monospace';
        cx.fillText('Final Feliz!', GW / 2, 80);
        cx.fillStyle = '#FFD700'; cx.font = '24px monospace';
        cx.fillText('O Casamento Real', GW / 2, 120);
        cx.fillStyle = '#FF69B4'; cx.fillRect(GW / 2 - 50, 180, 24, 32);
        cx.fillStyle = '#4169E1'; cx.fillRect(GW / 2 + 26, 180, 24, 32);
        cx.fillStyle = '#ff6b9d'; cx.font = '40px monospace';
        cx.fillText('\u2665', GW / 2, 205);
        cx.fillStyle = '#fff'; cx.font = '14px monospace';
        cx.fillText('Jhulia resgatou o principe Willian!', GW / 2, 260);
        cx.fillText('Eles se casaram e viveram felizes para sempre.', GW / 2, 285);
    } else {
        cx.fillStyle = '#9B59B6'; cx.font = 'bold 36px monospace';
        cx.fillText('Final Tragico!', GW / 2, 80);
        cx.fillStyle = '#ccc'; cx.font = '24px monospace';
        cx.fillText('Presos Juntos', GW / 2, 120);
        cx.fillStyle = '#555'; cx.fillRect(GW / 2 - 80, 160, 160, 100);
        cx.fillStyle = '#333';
        for (var i = 0; i < 5; i++) cx.fillRect(GW / 2 - 70 + i * 30, 160, 6, 100);
        cx.fillStyle = '#FF69B4'; cx.fillRect(GW / 2 - 30, 220, 20, 28);
        cx.fillStyle = '#4169E1'; cx.fillRect(GW / 2 + 10, 220, 20, 28);
        cx.fillStyle = '#fff'; cx.font = '14px monospace';
        cx.fillText('Jhulia zombou de Willian...', GW / 2, 300);
        cx.fillText('Mas ele a puxou para a cela!', GW / 2, 325);
        cx.fillText('Agora os dois estao presos juntos.', GW / 2, 350);
    }

    if (endingText) {
        cx.fillStyle = '#aaa'; cx.font = 'italic 12px monospace';
        var lines = wrapText(endingText, 70), ly = 400;
        for (var li = 0; li < lines.length && ly < GH - 30; li++) {
            cx.fillText(lines[li], GW / 2, ly); ly += 16;
        }
    } else if (geminiLoading) {
        cx.fillStyle = '#888'; cx.font = '12px monospace';
        cx.fillText('O Bardo IA esta escrevendo sua historia...', GW / 2, 410);
    }

    cx.fillStyle = '#888'; cx.font = '11px monospace';
    cx.fillText('Chocolates: ' + player.choc + '/8  |  Vida: ' + player.hp + '/' + player.maxHp, GW / 2, GH - 50);

    cx.fillStyle = Math.sin(tick * 0.08) > 0 ? '#fff' : '#aaa';
    cx.font = '16px monospace';
    cx.fillText('Clique ou ENTER para reiniciar', GW / 2, GH - 20);
    cx.textAlign = 'left';
}

// --- game over ---
function drawGameOverScreen() {
    cx.fillStyle = 'rgba(0,0,0,0.85)'; cx.fillRect(0, 0, GW, GH);
    cx.textAlign = 'center';
    cx.fillStyle = '#ff0000'; cx.font = 'bold 48px monospace';
    cx.fillText('GAME OVER', GW / 2, GH / 2 - 20);
    cx.fillStyle = '#aaa'; cx.font = '18px monospace';
    cx.fillText('Jhulia foi derrotada...', GW / 2, GH / 2 + 20);
    cx.fillStyle = Math.sin(tick * 0.08) > 0 ? '#fff' : '#aaa';
    cx.font = '16px monospace';
    cx.fillText('Clique ou ENTER para tentar novamente', GW / 2, GH / 2 + 70);
    cx.textAlign = 'left';
}

// --- text wrap ---
function wrapText(text, maxChars) {
    var words = text.split(' '), lines = [], line = '';
    for (var i = 0; i < words.length; i++) {
        if ((line + ' ' + words[i]).length > maxChars) { lines.push(line.trim()); line = words[i]; }
        else line += ' ' + words[i];
    }
    if (line.trim()) lines.push(line.trim());
    return lines;
}

// --- Gemini AI integration ---
function callGemini() {
    if (!geminiKey) {
        endingText = '(Configure a chave da API Gemini para gerar contos exclusivos com IA!)';
        return;
    }
    geminiLoading = true;
    var ending = endingChoice === 1 ? 'feliz (casamento)' : 'tragico (presos juntos)';
    var prompt = 'Voce e "O Bardo IA" do jogo "A Lenda de Jhulia e Willian". A guerreira Jhulia derrotou o Bizorro Rei para salvar o principe Willian. Final escolhido: ' + ending + '. Chocolates coletados: ' + player.choc + '/8. Vida restante: ' + player.hp + '/' + player.maxHp + '. Escreva um mini conto de 3-4 frases sobre esse final, em portugues, de forma epica e poetica.';
    fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + geminiKey, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    })
    .then(function (resp) { return resp.json(); })
    .then(function (data) {
        endingText = (data && data.candidates && data.candidates[0] && data.candidates[0].content &&
                      data.candidates[0].content.parts && data.candidates[0].content.parts[0] &&
                      data.candidates[0].content.parts[0].text) || 'O Bardo silenciou... mas a lenda vive para sempre.';
        geminiLoading = false;
    })
    .catch(function () {
        endingText = 'O Bardo nao pode contar a historia hoje, mas a lenda de Jhulia e Willian sera lembrada para sempre!';
        geminiLoading = false;
    });
}

// =================================================================
//  MAIN LOOP
// =================================================================

function update() {
    tick++;

    if (gameState === 'title') {
        if (inp('enter') || clicked) {
            gameState = 'play'; initLevel(); initAudio(); clicked = false;
        }
        clicked = false;
        return;
    }

    if (gameState === 'gameover') {
        if (inp('enter') || clicked) {
            gameState = 'play'; initLevel(); clicked = false;
        }
        clicked = false;
        return;
    }

    if (gameState === 'ending') {
        if (inp('up') || keys.KeyW) endingChoice = 1;
        if (keys.KeyS || keys.ArrowDown) endingChoice = 2;
        if (clicked) {
            if (clickY >= 170 && clickY < 250) endingChoice = 1;
            if (clickY >= 270 && clickY < 350) endingChoice = 2;
            if (endingChoice > 0) { gameState = 'finalScreen'; callGemini(); clicked = false; return; }
        }
        if (inp('enter') && endingChoice > 0) { gameState = 'finalScreen'; callGemini(); }
        clicked = false;
        return;
    }

    if (gameState === 'finalScreen') {
        if (inp('enter') || clicked) { gameState = 'title'; clicked = false; }
        clicked = false;
        return;
    }

    // play
    if (hitStop > 0) { hitStop--; clicked = false; return; }

    updatePlayer();
    updateEnemies();
    updateProjectiles();
    updateCollectibles();
    updateDoors();
    updateFallingTiles();
    updateParts();
    updateDnums();

    camFollow(player.x, player.y, WW, WH);
    camUpdate();

    if (bossDefeated && gameState === 'play') {
        gameState = 'ending';
        snd('win');
    }

    clicked = false;
}

function draw() {
    cx.clearRect(0, 0, GW, GH);

    if (gameState === 'title') { drawTitle(); return; }
    if (gameState === 'ending')      { drawEnding(); return; }
    if (gameState === 'finalScreen') { drawFinalScreen(); return; }

    drawBG();
    cx.save();
    cx.translate(-(camX + shakeX) | 0, -(camY + shakeY) | 0);
    drawTiles();
    drawCollectibles();
    drawNPCs();
    drawEnemies();
    drawProjectiles();
    drawPlayer();
    drawParts();
    drawDnums();
    cx.restore();

    if (gameState === 'gameover') { drawGameOverScreen(); return; }

    drawUI();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// --- start ---
initLevel();
gameState = 'title';
loop();

console.log('%cA Lenda de Jhulia e Willian', 'color:#FF69B4;font-size:18px;font-weight:bold');
console.log('Controles: WASD/Setas = Mover | J/Z = Atacar | K/X = Dash | Espaco = Pular');
</script>
